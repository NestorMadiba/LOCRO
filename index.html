                <div>
                    <label for="cantidad" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Cantidad de Platos</label>
                    <input type="number" id="cantidad" min="1" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-700 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:bg-white transition-all" placeholder="Ej: 2">

                <div>
                    <label for="importe" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Importe Total Cobrado ($)</label>
                    <input type="number" id="importe" min="0" step="any" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-700 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:bg-white transition-all" placeholder="Ej: 6000">

                <div>
                    <label for="retira" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">¿Quién retira el plato?</label>

                    <select id="tipoPago" required onchange="evaluarTipoPago()" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-700 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:bg-white transition-all">

                        <option value="Efectivo">Efectivo</option>
                    </select>
                </div>

                <div id="contenedorComprobante">
                    <label for="comprobante" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Comprobante de Transferencia</label>
                    <input type="file" id="comprobante" accept="image/*" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm text-slate-600 file:mr-4 file:py-1.5 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100 transition-all">
                </div>

                <div>
                    <label for="observaciones" class="block text-xs font-semibold text-slate-600 uppercase tracking-wider mb-1">Observaciones / Notas del Alumno (Opcional)</label>
                    <textarea id="observaciones" rows="2" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-700 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:bg-white transition-all resize-none" placeholder="Añade algún detalle sobre la entrega si es necesario."></textarea>
                </div>

                <div id="statusCarga" class="hidden text-center text-sm font-medium text-orange-600 animate-pulse">

                <button type="submit" id="btnEnviar" class="w-full bg-orange-600 text-white font-bold py-3.5 rounded-xl hover:bg-orange-700 shadow-md shadow-orange-200 active:scale-[0.99] transition-all duration-150">

                ❌ Ocurrió un error al procesar el registro. Intenta nuevamente.
            </div>

                    CONTROL DE TRANSFERENCIAS
                </a>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://gcgroizecpxayjywuqwt.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdjZ3JvaXplY3B4YXlqeXd1cXd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMTgwMDEsImV4cCI6MjA5ODY5NDAwMX0.tvr_7-J-zbIoSxXKircl5I_X0jKYyS4PBgEU9TBYpGQ";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function evaluarTipoPago() {
            const tipoPago = document.getElementById('tipoPago').value;
            const comprobanteInput = document.getElementById('comprobante');
            const contenedor = document.getElementById('contenedorComprobante');
            
            if (tipoPago === 'Efectivo') {
                contenedor.classList.add('opacity-40');
                comprobanteInput.disabled = true;
                comprobanteInput.required = false;
                comprobanteInput.value = ''; 
            } else {
                contenedor.classList.remove('opacity-40');
                comprobanteInput.disabled = false;
                comprobanteInput.required = true;
            }
        }

        document.getElementById('formVenta').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btnEnviar = document.getElementById('btnEnviar');
            const statusCarga = document.getElementById('statusCarga');
            const mensajeExito = document.getElementById('mensajeExito');
            const mensajeError = document.getElementById('mensajeError');

            mensajeExito.classList.add('hidden');
            mensajeError.classList.add('hidden');
            btnEnviar.disabled = true;
            statusCarga.classList.remove('hidden');

            const alumno = document.getElementById('alumno').value;
            const cantidad = parseInt(document.getElementById('cantidad').value);
            const importe = parseFloat(document.getElementById('importe').value); // Captura del nuevo campo
            const retira = document.getElementById('retira').value;
            const tipoPago = document.getElementById('tipoPago').value;
            const observaciones = document.getElementById('observaciones').value;
            const fileInput = document.getElementById('comprobante');
            
            let comprobanteUrl = null;

            try {
                if (tipoPago === 'Transferencia' && fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const fileExt = file.name.split('.').pop();
                    const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
                    
                    const { error: uploadError } = await supabaseClient
                        .storage
                        .from('comprobantes')
                        .upload(fileName, file);

                    if (uploadError) throw uploadError;

                    const { data: urlData } = supabaseClient
                        .storage
                        .from('comprobantes')
                        .getPublicUrl(fileName);

                    comprobanteUrl = urlData.publicUrl;
                }

                const { error: insertError } = await supabaseClient
                    .from('ventas_locro')
                    .insert([{
                        alumno: alumno,
                        cantidad: cantidad,
                        importe: importe, // Guardado en base de datos
                        persona_retira: retira,
                        tipo_pago: tipoPago,
                        comprobante_url: comprobanteUrl,
                        observaciones: observaciones,
                        estado: 'Pendiente'
                    }]);

                if (insertError) throw insertError;

                mensajeExito.classList.remove('hidden');
                document.getElementById('formVenta').reset();
                evaluarTipoPago();

            } catch (error) {
                console.error(error);
                mensajeError.classList.remove('hidden');
            } finally {
                btnEnviar.disabled = false;
                statusCarga.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
